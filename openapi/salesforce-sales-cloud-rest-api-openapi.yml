              type: string
              description: The sObject type
            url:
              type: string
              description: The relative URL for the record
        Id:
          type: string
          description: The 18-character Salesforce record ID
      additionalProperties: true
    CreateRecordResult:
      type: object
      description: Result from a create, update, or delete operation
      properties:
        id:
          type: string
          description: The ID of the created or affected record
        success:
          type: boolean
          description: Whether the operation succeeded
        errors:
          type: array
          description: List of errors if the operation failed
          items:
            $ref: '#/components/schemas/ApiError'
    QueryResult:
      type: object
      description: Result from a SOQL query execution
      properties:
        totalSize:
          type: integer
          description: Total number of records matching the query
        done:
          type: boolean
          description: Whether all results have been returned
        nextRecordsUrl:
          type: string
          description: URL to retrieve the next batch of results (if done is false)
        records:
          type: array
          description: Array of matching records
          items:
            $ref: '#/components/schemas/SObjectRecord'
    SearchResult:
      type: object
      description: Result from a SOSL search execution
      properties:
        searchRecords:
          type: array
          items:
            $ref: '#/components/schemas/SObjectRecord'
    ApiError:
      type: object
      description: An API error message
      properties:
        statusCode:
          type: string
          description: The error status code
        message:
          type: string
          description: The error message
        fields:
          type: array
          description: Fields related to the error
          items:
            type: string
    ErrorResponse:
      type: array
      description: Standard Salesforce REST API error response
      items:
        $ref: '#/components/schemas/ApiError'
  responses:
    BadRequest:
      description: Invalid request - malformed query, missing required fields, or validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication failed - invalid, expired, or missing access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found - invalid sObject name or record ID
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
